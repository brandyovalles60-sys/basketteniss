<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Panel Admin - BasketTeniss</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<h1 style="color:red;">VERSION NUEVA</h1>

<div id="login-admin">
  <h2>Acceso Admin</h2>

  <input id="adminUser" placeholder="Usuario">
  <input id="adminPass" type="password" placeholder="Contraseña">

  <button type="button" onclick="loginAdmin()">Entrar</button>
</div>

<div id="admin-panel" style="display:none;">

  <h2>Agregar producto</h2>

  <form id="formulario">
    <input type="hidden" id="productoId">

    <input id="nombre" name="nombre" placeholder="Nombre del producto" required>
    <input id="marca" name="marca" placeholder="Marca" required>
    <input id="precio" name="precio" type="number" placeholder="Precio" required>

    <select id="categoria" name="categoria" required>
      <option value="">Seleccionar categoría</option>
      <option value="Nike">Nike</option>
      <option value="Jordan">Jordan</option>
      <option value="Adidas">Adidas</option>
      <option value="Puma">Puma</option>
      <option value="Under Armour">Under Armour</option>
    </select>

    <select id="tipo" name="tipo" required>
      <option value="">Tipo de artículo</option>
      <option value="Tenis">Tenis</option>
      <option value="Ropa">Ropa deportiva</option>
      <option value="Accesorios">Accesorios</option>
    </select>

    <textarea id="descripcion" name="descripcion" placeholder="Descripción"></textarea>

    <input
      id="tallas"
      name="tallas"
      placeholder="Tallas disponibles. Ej: 38,39,40,41,42"
    />

    <input type="file" id="imagen" name="imagen" required>

    <div class="preview-box">
      <img id="preview-img" src="" alt="">
    </div>

    <button
      type="submit"
      id="btn-submit">
      Agregar
    </button>

    <button
      type="button"
      id="btn-cancelar-edicion"
      onclick="cancelarEdicion()"
      style="display:none;">
      Cancelar edición
    </button>

  </form>

  <hr>

  <div class="admin-list-header">
  <h2>Lista de productos</h2>

  <input
    type="text"
    id="buscador-productos"
    placeholder="Buscar por nombre, marca o categoría..."
  >
</div>

<div id="lista" class="admin-product-grid"></div>

</div>

<script src="admin.js"></script>
</body>
</html>
